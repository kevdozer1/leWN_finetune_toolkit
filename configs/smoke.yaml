# End-to-end smoke config. Tiny: 1 epoch, batch 4 — runs on any GPU or CPU.
#
# This file is a TEMPLATE. Before running it, edit the two placeholders
# marked with <ANGLE_BRACKETS> below so they point at your dataset.
#
# Usage:
#     lewm-finetune inspect <data_cache_dir>/datasets/<dataset_name>.h5
#     lewm-finetune train --config configs/smoke.yaml
#     lewm-finetune eval --run-dir runs/<timestamp>_smoke

# Pretrained checkpoint. HuggingFace repo ids are auto-downloaded on first
# use, so no local path is required. Swap for a local folder if you prefer.
pretrained_path: quentinll/lewm-cube

# EDIT THESE to match your machine. The loader reads
# <data_cache_dir>/datasets/<dataset_name>.h5 — both pieces are required.
dataset_name: <YOUR_DATASET_NAME>
data_cache_dir: ./data

action_dim: 7
frameskip: 1
history_size: 3
num_preds: 1
batch_size: 4
num_workers: 0
max_epochs: 1
lr: 5.0e-5
sigreg_weight: 0.09
precision: bf16-mixed
seed: 42
run_name: smoke
